# Configuration file for 3D U-Net soma detection

# Model configuration
model:
  type: 'soma_unet'  # 'unet' or 'soma_unet'
  n_channels: 1
  n_classes: 1
  dropout_rate: 0.1
  use_attention: false

# Data configuration
data:
  target_size: [128, 128, 128]  # Target size for model input
  normalize: true
  augment: true
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  min_object_size: 10  # Minimum soma size in voxels
  voxel_spacing: [0.65, 0.65, 3.0]  # Physical spacing in microns

# Training configuration
training:
  epochs: 100
  batch_size: 4
  learning_rate: 1e-4
  weight_decay: 1e-5
  patience: 15  # Early stopping patience
  checkpoint_frequency: 10  # Save checkpoint every N epochs
  
  # Loss function
  loss_type: 'bce'  # 'bce', 'dice', 'combined'
  dice_weight: 0.5  # Weight for dice loss if using combined loss
  
  # Optimizer
  optimizer: 'adam'  # 'adam', 'sgd', 'adamw'
  momentum: 0.9  # For SGD
  
  # Scheduler
  scheduler: 'reduce_on_plateau'  # 'reduce_on_plateau', 'step', 'cosine'
  scheduler_patience: 10
  scheduler_factor: 0.5
  step_size: 30
  gamma: 0.1

# Inference configuration
inference:
  confidence_threshold: 0.5
  min_soma_volume: 100  # Minimum soma volume in voxels
  max_soma_volume: 100000  # Maximum soma volume in voxels
  use_sliding_window: false  # For large volumes
  window_size: [128, 128, 128]
  overlap: 0.5

# Evaluation configuration
evaluation:
  metrics: ['dice', 'iou', 'precision', 'recall', 'f1', 'hausdorff', 'volume_error']
  min_object_size: 10
  surface_tolerance: 1.0  # Tolerance for surface overlap metrics

# Paths
paths:
  nrrd_dir: 'data/nrrd'
  mask_dir: 'data/masks'
  checkpoint_dir: 'results/checkpoints'
  log_dir: 'results/logs'
  output_dir: 'results/output'

# Logging
logging:
  level: 'INFO'
  save_predictions: true
  save_visualizations: true
  tensorboard: true